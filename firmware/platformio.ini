; PlatformIO configuration for AI Thinker ESP32-CAM
; Flash with GPIO0 held LOW, then release after upload begins.

[env:esp32cam]
platform              = espressif32
board                 = esp32cam
framework             = arduino
monitor_speed         = 115200
upload_speed          = 921600
board_build.partitions = huge_app.csv

; Extra flags: enable PSRAM, raise stack size for camera tasks
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0
